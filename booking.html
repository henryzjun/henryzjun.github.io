  <script type="text/babel">
// Shared — EditableImage：全站圖片槽
// 前台（上架網頁／一般預覽）：只顯示已發佈的圖片檔（assets/slots/），完全不顯示任何編輯按鈕。
// 後台模式（網址帶 ?admin=1，或被後台以 data-admin iframe 嵌入）：顯示「更換圖片／還原」。
// 後台更換的圖片先暫存在瀏覽器 localStorage（狀態＝待發佈）；
// 在對話中跟 Claude 說「發佈圖片」，才會真正寫進 assets/slots/ 並重新打包上架網頁。
(function () {
  var admin = false;
  try {
    if (/[?&]admin=1/.test(window.location.search)) admin = true;
    else if (window.frameElement && window.frameElement.hasAttribute("data-admin")) admin = true;
  } catch (e) {}
  window.HENRY_ADMIN = admin;
  if (!admin) return; // 前台不需要編輯樣式
  if (document.getElementById("ei-styles")) return;
  var st = document.createElement("style");
  st.id = "ei-styles";
  st.textContent = `
    .ei-wrap { position: relative; overflow: hidden; }
    .ei-controls { position: absolute; top: 10px; right: 10px; z-index: 6; display: flex; gap: 6px;
      opacity: 0; transition: opacity 160ms ease; }
    .ei-wrap:hover .ei-controls, .ei-wrap:focus-within .ei-controls,
    figure:hover .ei-controls, .hs-card:hover .ei-controls { opacity: 1; }
    @media (hover: none) { .ei-controls { opacity: 1; } }
    .ei-btn { display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 11px;
      border-radius: 999px; border: 1px solid rgba(251,251,250,0.35);
      background: rgba(28,27,25,0.55); color: #fbfbfa; font-size: 12px; line-height: 1;
      font-family: var(--font-sans, sans-serif); font-weight: 500; cursor: pointer;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      transition: background 160ms ease; white-space: nowrap; }
    .ei-btn:hover { background: rgba(28,27,25,0.78); }
    .ei-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
  `;
  document.head.appendChild(st);
})();

// 讀取某個圖片槽目前的圖 — 給 Lightbox 等唯讀場景用。
// 前台一律回傳已發佈的檔案；後台模式才會優先回傳 localStorage 裡的待發佈版本。
window.henryImg = function (id, fallback) {
  var fb = window.A ? window.A(fallback) : fallback;
  if (!window.HENRY_ADMIN) return fb;
  try { return localStorage.getItem("henry-img-" + id) || fb; } catch (e) { return fb; }
};

function EditableImage({ id, src, alt = "", style = {}, imgStyle = {}, maxEdge = 1600, label = "更換圖片" }) {
  const admin = !!window.HENRY_ADMIN;
  const key = "henry-img-" + id;
  const [custom, setCustom] = React.useState(() => {
    if (!admin) return null;
    try { return localStorage.getItem(key); } catch (e) { return null; }
  });
  const inputRef = React.useRef(null);

  // 後台：跨頁同步（在媒體管理頁更換圖片時，預覽 iframe 立即更新）
  React.useEffect(() => {
    if (!admin) return;
    const onStorage = (e) => { if (e.key === key) setCustom(e.newValue); };
    window.addEventListener("storage", onStorage);
    return () => window.removeEventListener("storage", onStorage);
  }, [key, admin]);

  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!f) return;
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxEdge / Math.max(img.width, img.height));
      const w = Math.max(1, Math.round(img.width * scale));
      const h = Math.max(1, Math.round(img.height * scale));
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      let q = 0.85;
      let out = c.toDataURL("image/jpeg", q);
      while (out.length > 700 * 1024 && q > 0.55) { q -= 0.08; out = c.toDataURL("image/jpeg", q); }
      URL.revokeObjectURL(url);
      try { localStorage.setItem(key, out); setCustom(out); }
      catch (err) { alert("瀏覽器儲存空間不足：請先「還原」其他圖片，或改用較小的照片。"); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); alert("無法讀取此圖片，請改用 JPG 或 PNG 檔。"); };
    img.src = url;
  };

  const reset = (e) => {
    e.stopPropagation();
    try { localStorage.removeItem(key); } catch (err) {}
    setCustom(null);
  };

  const resolved = (admin && custom) || (window.A ? window.A(src) : src);

  return (
    <div className="ei-wrap" style={style}>
      <img src={resolved} alt={alt}
        style={{ width: "100%", height: "100%", objectFit: "cover", display: "block", ...imgStyle }} />
      {admin && (
        <div className="ei-controls" onClick={(e) => e.stopPropagation()}>
          <button type="button" className="ei-btn" aria-label={label}
            onClick={(e) => { e.stopPropagation(); inputRef.current && inputRef.current.click(); }}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            {label}
          </button>
          {custom && (
            <button type="button" className="ei-btn" onClick={reset} aria-label="還原已發佈版本">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
              還原
            </button>
          )}
        </div>
      )}
      {admin && (
        <input ref={inputRef} type="file" accept="image/*" style={{ display: "none" }}
          onChange={onFile} onClick={(e) => e.stopPropagation()} />
      )}
    </div>
  );
}
window.EditableImage = EditableImage;

</script>
  <script type="text/babel">
// Shared — React 安全版 Lucide 圖示
// 問題：lucide.createIcons() 會把 <i data-lucide> 直接換成 <svg>。若那個 <i> 是 React（JSX）
// 渲染的，React 之後要移除/更新節點時會找不到原本的 <i>，丟出
// "removeChild ... is not a child of this node" 錯誤（多步驟表單按上一步時最常見）。
// 解法：React 只管理外層 <span>；內部的 <i>→<svg> 由命令式 DOM 操作處理，兩者互不干擾。
function Icon({ name, size, style, className }) {
  const ref = React.useRef(null);
  React.useLayoutEffect(() => {
    const span = ref.current;
    if (!span || !name) return;
    span.innerHTML = "";
    const i = document.createElement("i");
    i.setAttribute("data-lucide", name);
    span.appendChild(i);
    if (window.lucide && window.lucide.createIcons) {
      try { window.lucide.createIcons(); } catch (e) {}
    }
    const svg = span.querySelector("svg");
    if (svg) {
      svg.style.display = "block";
      if (size) { svg.setAttribute("width", size); svg.setAttribute("height", size); }
    }
    return () => { try { span.innerHTML = ""; } catch (e) {} };
  }, [name, size]);
  return (
    <span ref={ref} className={className} aria-hidden="true"
      style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", ...style }}></span>
  );
}
window.Icon = Icon;

</script>

function Stepper({ step, steps }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 0 }}>
      {steps.map((s, i) => {
        const done = i < step;
        const active = i === step;
        return (
          <React.Fragment key={s}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{
                display: "inline-flex", alignItems: "center", justifyContent: "center",

    // ===== 預約資料送出 → Google 試算表 =====
    // 部署 Apps Script 後，把 /exec 結尾的網址貼進下面這行引號中：
    const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbxGh-_VOnFBRgHVkomimSJMOLoMVAnj_lF6XHxL1ovzCfCukuenXIrLjxWqUBhoNsVk6w/exec";

    function genBookingId(){
      const d = new Date();
      const yy = String(d.getFullYear()).slice(-2);
      const mm = String(d.getMonth()+1).padStart(2,"0");
      const seq = String(Math.floor(Math.random()*10000)).padStart(4,"0");
      return "HP-" + yy + mm + "-" + seq;
    }

    function submitBooking(data){
      const row = {
        "預約編號": data.bookingId,
        "時間戳記": new Date().toLocaleString("zh-TW", { timeZone: "Asia/Tokyo", hour12: false }),
        "方案": data.pkg,
        "金額": ({ "攝影紀錄（照片）":"NT$ 8,500", "雪地跟拍（影片）":"NT$ 11,000", "完整紀錄（照片＋影片）":"NT$ 19,500" }[data.pkg] || "NT$ 8,500"),
        "日期": data.date,
        "開始時間": data.time,
        "會面地點": data.loc,
        "團體人數": data.people,
        "攝影風格": data.style,
        "特殊需求": data.special,
        "代表人姓名": data.name,
        "電子郵件": data.email,
        "社群媒體帳號": data.social,
      };
      // 1) 本地備份：任何情況下都不遺失（可於瀏覽器主控台 localStorage 的 henry-bookings 查看）
      try {
        const logArr = JSON.parse(localStorage.getItem("henry-bookings") || "[]");
        logArr.push(row);
        localStorage.setItem("henry-bookings", JSON.stringify(logArr));
      } catch (e) {}
      // 2) 送到 Google 試算表（no-cors：靜態網站送出後不需讀回應，資料仍會寫入）
      if (SHEET_ENDPOINT) {
        try {
          fetch(SHEET_ENDPOINT, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(row),
          }).catch(function(){});
        } catch (e) {}
      }
    }

    function App(){
      const PKG_VALID = ["攝影紀錄（照片）","雪地跟拍（影片）","完整紀錄（照片＋影片）"];
      const urlPkg = (() => { try { return new URLSearchParams(window.location.search).get("pkg"); } catch(e){ return null; } })();
      const prePkg = PKG_VALID.includes(urlPkg) ? urlPkg : null;
      const [step, setStep] = React.useState(prePkg ? 1 : 0);
      const [noticeOpen, setNoticeOpen] = React.useState(false);
      const [data, setData] = React.useState({ pkg: prePkg || "攝影紀錄（照片）", date:"", time:"", loc:"二世谷 Hirafu雪場", people:"1", style:"", special:"", name:"", email:"", social:"", bookingId:"" });
      const set = (patch) => setData(d => ({ ...d, ...patch }));
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); }, []);
      const done = step >= STEPS.length;

      return (
        <div style={{ maxWidth: 1080, margin:"0 auto", padding:"32px clamp(16px, 4vw, 40px) 80px" }}>
          <a href={window.HENRY_LINKS.home} style={{ display:"flex", width:"fit-content", alignItems:"center", gap:6, fontSize:"var(--text-sm)", color:"var(--text-muted)", marginBottom: 22 }}>
            <Icon name="arrow-left" size={16} /> 回首頁
          </a>
          <span className="ds-eyebrow">BOOKING</span>
          <h1 style={{ fontSize:"var(--text-3xl)", margin:"8px 0 30px" }}>預約你的雪季拍攝</h1>

          <div style={{ display:"flex", gap: 36, alignItems:"flex-start", flexWrap:"wrap" }}>
            <div style={{ flex:"999 1 420px", minWidth:0 }}>
              {!done && (
                <div style={{ marginBottom: 34 }}><Stepper step={step} steps={STEPS} /></div>
              )}
              <div style={{
                background:"var(--surface-card)", border:"1px solid var(--border-soft)",
                borderRadius:"var(--radius-lg)", boxShadow:"var(--shadow-sm)", padding: "clamp(18px, 3.5vw, 30px) clamp(18px, 3.5vw, 30px) 26px",
              }}>
                {step === 0 && <StepChoose data={data} set={set} />}
                {step === 1 && <StepDetails data={data} set={set} />}
                {step === 2 && <StepContact data={data} set={set} />}
                {done && <StepDone data={data} />}

                {!done && (
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop: 28, paddingTop: 22, borderTop:"1px solid var(--divider)" }}>
                    <Button variant="ghost" disabled={step===0} onClick={()=>setStep(s=>Math.max(0,s-1))} iconLeft={<Icon name="chevron-left" />}>上一步</Button>
                    <Button variant="primary" onClick={()=>{ if (step===STEPS.length-1) { setNoticeOpen(true); } else { setStep(s=>s+1); } }} iconRight={<Icon name={step===STEPS.length-1?"file-check":"chevron-right"} />}>
                      {step===STEPS.length-1 ? "閱讀預約須知並送出" : "下一步"}
                    </Button>
                  </div>
                )}
              </div>
            </div>
            {!done && <BookingSummary data={data} />}
          </div>
          <NoticeModal open={noticeOpen} onClose={()=>setNoticeOpen(false)} onConfirm={()=>{ setNoticeOpen(false); const id = genBookingId(); const submitData = { ...data, bookingId: id }; set({ bookingId: id }); submitBooking(submitData); setStep(STEPS.length); }} />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
