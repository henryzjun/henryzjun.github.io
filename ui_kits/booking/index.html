<!-- @startingPoint section="Booking" subtitle="滑雪拍攝多步驟預約流程" viewport="1280x860" -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>預約拍攝 — 亨利攝影工作室</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="Stepper.jsx"></script>
  <script type="text/babel" src="BookingSummary.jsx"></script>
  <script type="text/babel" src="Steps.jsx"></script>
  <script type="text/babel">
    const { Button } = window.HenryStudioRemix_704588;
    const STEPS = ["選擇方案", "拍攝細節", "聯絡方式"];
    function App(){
      const [step, setStep] = React.useState(0);
      const [data, setData] = React.useState({ pkg:"個人跟拍 · 半日", loc:"NISEKO 二世谷", date:"", people:"1", name:"", notes:"" });
      const set = (patch) => setData(d => ({ ...d, ...patch }));
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
      const done = step >= STEPS.length;

      return (
        <div style={{ maxWidth: 1080, margin:"0 auto", padding:"40px 40px 80px" }}>
          <a href="../website/index.html" style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:"var(--text-sm)", color:"var(--text-muted)", marginBottom: 22 }}>
            <i data-lucide="arrow-left" style={{width:16,height:16}}></i> 回首頁
          </a>
          <span className="ds-eyebrow">BOOKING</span>
          <h1 style={{ fontSize:"var(--text-3xl)", margin:"8px 0 30px" }}>預約你的雪季拍攝</h1>

          <div style={{ display:"flex", gap: 36, alignItems:"flex-start" }}>
            <div style={{ flex:1, minWidth:0 }}>
              {!done && (
                <div style={{ marginBottom: 34 }}><Stepper step={step} steps={STEPS} /></div>
              )}
              <div style={{
                background:"var(--surface-card)", border:"1px solid var(--border-soft)",
                borderRadius:"var(--radius-lg)", boxShadow:"var(--shadow-sm)", padding: "30px 30px 26px",
              }}>
                {step === 0 && <StepChoose data={data} set={set} />}
                {step === 1 && <StepDetails data={data} set={set} />}
                {step === 2 && <StepContact data={data} set={set} />}
                {done && <StepDone data={data} />}

                {!done && (
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop: 28, paddingTop: 22, borderTop:"1px solid var(--divider)" }}>
                    <Button variant="ghost" disabled={step===0} onClick={()=>setStep(s=>Math.max(0,s-1))} iconLeft={<i data-lucide="chevron-left"></i>}>上一步</Button>
                    <Button variant="primary" onClick={()=>setStep(s=>s+1)} iconRight={<i data-lucide={step===STEPS.length-1?"send":"chevron-right"}></i>}>
                      {step===STEPS.length-1 ? "送出預約" : "下一步"}
                    </Button>
                  </div>
                )}
              </div>
            </div>
            {!done && <BookingSummary data={data} />}
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
