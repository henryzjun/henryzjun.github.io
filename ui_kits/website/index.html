<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>亨利攝影工作室 — 滑雪影像</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="SiteNav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="FeaturedWork.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel">
    function App(){
      const [active, setActive] = React.useState("home");
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
      const nav = (id) => {
        setActive(id);
        if (id === "book") { window.location.href = "../booking/index.html"; return; }
        if (id === "work") { window.location.href = "../gallery/index.html"; return; }
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 70, behavior: "smooth" });
        else window.scrollTo({ top: 0, behavior: "smooth" });
      };
      return (
        <>
          <SiteNav onNav={nav} active={active} />
          <Hero onNav={nav} />
          <div id="work"><FeaturedWork onNav={nav} /></div>
          <div id="services"><Services onNav={nav} /></div>
          <PhilosophyBand />
          <SiteFooter onNav={nav} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
