<!-- @startingPoint section="Website" subtitle="滑雪攝影行銷首頁" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>亨利攝影工作室 — 滑雪影像</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="site.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  /* 保險：舊版手機預覽按鈕若被舊 bundle 注入，一律隱藏（前台不顯示） */
  #mp-fab, #mp-overlay, #mp-close, #mp-label { display: none !important; }

  /* ===== Tweaks 表現控制 ===== */
  /* 品牌主色 */
  :root[data-accent="moss"] {
    --brand: var(--moss-500); --brand-hover: var(--moss-600); --brand-active: var(--moss-700);
    --brand-soft: var(--moss-100, #e9efe3); --brand-soft-text: var(--moss-700);
    --accent: var(--moss-500); --accent-hover: var(--moss-600);
    --accent-soft: var(--moss-100, #e9efe3); --accent-soft-text: var(--moss-700);
    --surface-brand: var(--moss-500); --text-link: var(--moss-600);
  }
  :root[data-accent="deep"] {
    --brand: var(--ice-700); --brand-hover: var(--ice-800); --brand-active: var(--ice-800);
    --brand-soft: var(--ice-100); --brand-soft-text: var(--ice-800);
    --accent: var(--ice-700); --accent-hover: var(--ice-800);
    --accent-soft: var(--ice-100); --accent-soft-text: var(--ice-800);
    --surface-brand: var(--ice-700); --text-link: var(--ice-700);
  }
  /* 影像色調：套用於全站照片 */
  :root[data-tone="cool"] .ei-wrap img { filter: saturate(0.86) contrast(1.07) hue-rotate(-6deg); }
  :root[data-tone="mono"] .ei-wrap img { filter: grayscale(1) contrast(1.1); }
  .ei-wrap img { transition: filter 320ms ease; }
  /* Hero 滿版沉浸 */
  :root[data-hero="full"] { --hero-h: 100svh; }
</style>
<script>
  // 資源解析器：透過頁尾隱藏的 <img data-slot> 静態參照取得實際網址。
  // 打包成單一檔時，那些 img 的 src 會被改寫成內嵌資源，這裡就會回傳內嵌網址。
  window.A = function (p) {
    var m = /([^\/]+)\.(jpg|jpeg|png|webp|svg)$/i.exec(p || "");
    var el = m && document.querySelector('img[data-slot="' + m[1] + '"]');
    return (el && el.getAttribute("src")) || p;
  };
  // 站內連結（打包成單一檔時會被改寫成根目錄檔名）
  window.HENRY_LINKS = {
    home: "../website/index.html",
    booking: "../booking/index.html",
    gallery: "../gallery/index.html",
  };
</script>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <rect width="120" height="120" fill="#538799"></rect>
    <circle cx="60" cy="60" r="22" fill="#deeaee"></circle>
    <rect x="56.5" y="38" width="7" height="44" rx="3.5" fill="#365764" transform="rotate(36 60 60)"></rect>
    <rect x="53" y="40" width="3.4" height="40" rx="1.7" fill="#538799" transform="rotate(-36 60 60)"></rect>
    <rect x="63.6" y="40" width="3.4" height="40" rx="1.7" fill="#538799" transform="rotate(-36 60 60)"></rect>
  </svg>
</template>
</head>
<body>
  <div id="root"></div>
  <!-- 圖片槽静態參照：讓打包器把已發佈圖片內嵌進單一檔案（由 window.A 讀取） -->
  <div id="henry-assets" style="display:none" aria-hidden="true">
    <img data-slot="cover-hero" src="../../assets/slots/cover-hero.jpg" alt="">
    <img data-slot="logo-lockup" src="../../assets/logo-lockup.svg" alt="">
    <img data-slot="logo-lockup-inverse" src="../../assets/logo-lockup-inverse.svg" alt="">
    <img data-slot="philosophy-band" src="../../assets/slots/philosophy-band.jpg" alt="">
    <img data-slot="photo-peak-mist" src="../../assets/slots/photo-peak-mist.jpg" alt="">
    <img data-slot="photo-slope-dawn" src="../../assets/slots/photo-slope-dawn.jpg" alt="">
    <img data-slot="photo-powder-run" src="../../assets/slots/photo-powder-run.jpg" alt="">
    <img data-slot="photo-summit-blue" src="../../assets/slots/photo-summit-blue.jpg" alt="">
    <img data-slot="photo-forest-valley" src="../../assets/slots/photo-forest-valley.jpg" alt="">
    <img data-slot="photo-hero-ridge" src="../../assets/slots/photo-hero-ridge.jpg" alt="">
  </div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="../shared/EditableImage.jsx"></script>
  <script type="text/babel" src="../shared/tweaks-panel.jsx"></script>
  <script type="text/babel" src="SiteNav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="FeaturedWork.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#538799",
      "imageTone": "冷冽",
      "heroLayout": "經典"
    }/*EDITMODE-END*/;
    const ACCENT_MAP = { "#538799": "ice", "#647a4f": "moss", "#365764": "deep" };
    const TONE_MAP = { "自然": "natural", "冷冽": "cool", "銀鹽黑白": "mono" };
    function App(){
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [active, setActive] = React.useState("home");
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
      React.useEffect(() => {
        const root = document.documentElement;
        root.dataset.accent = ACCENT_MAP[t.accentColor] || "ice";
        root.dataset.tone = TONE_MAP[t.imageTone] || "natural";
        root.dataset.hero = t.heroLayout === "滿版沉浸" ? "full" : "classic";
      }, [t.accentColor, t.imageTone, t.heroLayout]);
      const nav = (id) => {
        setActive(id);
        if (id === "book") { window.location.href = window.HENRY_LINKS.booking; return; }
        if (id === "work") { window.location.href = window.HENRY_LINKS.gallery; return; }
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 70, behavior: "smooth" });
        else window.scrollTo({ top: 0, behavior: "smooth" });
      };
      return (
        <>
          <SiteNav onNav={nav} active={active} />
          <Hero onNav={nav} />
          <div id="work"><FeaturedWork onNav={nav} /></div>
          <div id="services"><Services onNav={nav} /></div>
          <PhilosophyBand />
          <SiteFooter onNav={nav} />
          <TweaksPanel>
            <TweakSection label="影像" />
            <TweakRadio label="色調" value={t.imageTone}
              options={["自然", "冷冽", "銀鹽黑白"]}
              onChange={(v) => setTweak("imageTone", v)} />
            <TweakSection label="品牌" />
            <TweakColor label="主色" value={t.accentColor}
              options={["#538799", "#647a4f", "#365764"]}
              onChange={(v) => setTweak("accentColor", v)} />
            <TweakSection label="版面" />
            <TweakRadio label="Hero" value={t.heroLayout}
              options={["經典", "滿版沉浸"]}
              onChange={(v) => setTweak("heroLayout", v)} />
          </TweaksPanel>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
