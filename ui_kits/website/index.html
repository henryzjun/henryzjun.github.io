<!-- @startingPoint section="Website" subtitle="滑雪攝影行銷首頁" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>亨利攝影工作室 — 滑雪影像</title>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="site.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
</style>
<script>
  // 資源解析器：打包單檔時 HENRY_ASSETS 會帶入 data URL，平常直接用相對路徑
  window.A = function (p) { return (window.HENRY_ASSETS || {})[p] || p; };
  // 站內連結（打包成單一檔時會被改寫成根目錄檔名）
  window.HENRY_LINKS = {
    home: "../website/index.html",
    booking: "../booking/index.html",
    gallery: "../gallery/index.html",
  };
</script>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <rect width="120" height="120" fill="#538799"></rect>
    <circle cx="60" cy="60" r="22" fill="#deeaee"></circle>
    <rect x="56.5" y="38" width="7" height="44" rx="3.5" fill="#365764" transform="rotate(36 60 60)"></rect>
    <rect x="53" y="40" width="3.4" height="40" rx="1.7" fill="#538799" transform="rotate(-36 60 60)"></rect>
    <rect x="63.6" y="40" width="3.4" height="40" rx="1.7" fill="#538799" transform="rotate(-36 60 60)"></rect>
  </svg>
</template>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="../shared/mobile-preview.js"></script>
  <script type="text/babel" src="../shared/EditableImage.jsx"></script>
  <script type="text/babel" src="SiteNav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="FeaturedWork.jsx"></script>
  <script type="text/babel" src="Services.jsx"></script>
  <script type="text/babel" src="Footer.jsx"></script>
  <script type="text/babel">
    function App(){
      const [active, setActive] = React.useState("home");
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
      const nav = (id) => {
        setActive(id);
        if (id === "book") { window.location.href = window.HENRY_LINKS.booking; return; }
        if (id === "work") { window.location.href = window.HENRY_LINKS.gallery; return; }
        const el = document.getElementById(id);
        if (el) window.scrollTo({ top: el.offsetTop - 70, behavior: "smooth" });
        else window.scrollTo({ top: 0, behavior: "smooth" });
      };
      return (
        <>
          <SiteNav onNav={nav} active={active} />
          <Hero onNav={nav} />
          <div id="work"><FeaturedWork onNav={nav} /></div>
          <div id="services"><Services onNav={nav} /></div>
          <PhilosophyBand />
          <SiteFooter onNav={nav} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
