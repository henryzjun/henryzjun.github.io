<!-- @startingPoint section="Gallery" subtitle="滑雪影像瀑布式作品集" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>作品集 — 亨利攝影工作室</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  /* 保險：舊版手機預覽按鈕若被舊 bundle 注入，一律隱藏（前台不顯示） */
  #mp-fab, #mp-overlay, #mp-close, #mp-label { display: none !important; }
  @media (max-width: 760px) {
    .lb-root { flex-direction: column !important; }
    .lb-stage { padding: 14px !important; min-height: 0; }
    .lb-stage img { max-height: 52svh !important; }
    .lb-aside { width: 100% !important; flex: 1 1 auto !important; }
  }
</style>
<script>
  window.A = function (p) {
    var m = /([^\/]+)\.(jpg|jpeg|png|webp|svg)$/i.exec(p || "");
    var el = m && document.querySelector('img[data-slot="' + m[1] + '"]');
    return (el && el.getAttribute("src")) || p;
  };
  window.HENRY_LINKS = {
    home: "../website/index.html",
    booking: "../booking/index.html",
    gallery: "../gallery/index.html",
  };
</script>
<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <rect width="120" height="120" fill="#9dc1cc"></rect>
    <rect x="34" y="34" width="24" height="34" rx="4" fill="#fbfbfa"></rect>
    <rect x="62" y="34" width="24" height="22" rx="4" fill="#365764"></rect>
    <rect x="34" y="72" width="24" height="14" rx="4" fill="#365764"></rect>
    <rect x="62" y="60" width="24" height="26" rx="4" fill="#fbfbfa"></rect>
  </svg>
</template>
</head>
<body>
  <div id="root"></div>
  <!-- 圖片槽静態參照：讓打包器把已發佈圖片內嵌進單一檔案（由 window.A 讀取） -->
  <div id="henry-assets" style="display:none" aria-hidden="true">
    <img data-slot="photo-peak-mist" src="../../assets/slots/photo-peak-mist.jpg" alt="">
    <img data-slot="photo-slope-dawn" src="../../assets/slots/photo-slope-dawn.jpg" alt="">
    <img data-slot="photo-powder-run" src="../../assets/slots/photo-powder-run.jpg" alt="">
    <img data-slot="photo-summit-blue" src="../../assets/slots/photo-summit-blue.jpg" alt="">
    <img data-slot="photo-forest-valley" src="../../assets/slots/photo-forest-valley.jpg" alt="">
    <img data-slot="photo-hero-ridge" src="../../assets/slots/photo-hero-ridge.jpg" alt="">
  </div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" src="../shared/EditableImage.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="GalleryGrid.jsx"></script>
  <script type="text/babel" src="Lightbox.jsx"></script>
  <script type="text/babel">
    const { Tabs, MetaRow } = window.HenryStudioRemix_704588;
    function App(){
      const all = window.GALLERY_ITEMS;
      const [cat, setCat] = React.useState("all");
      const [open, setOpen] = React.useState(null);
      React.useEffect(() => { window.lucide && window.lucide.createIcons(); });
      const shown = cat === "all" ? all : all.filter(i => i.cat === cat);
      const idx = open ? shown.findIndex(i => i.id === open.id) : -1;
      const step = (d) => { if (idx < 0) return; setOpen(shown[(idx + d + shown.length) % shown.length]); };

      return (
        <>
          <header style={{ padding: "44px clamp(20px, 4vw, 40px) 28px" }}>
            <a href={window.HENRY_LINKS.home} style={{ display:"inline-flex", alignItems:"center", gap:6, fontSize:"var(--text-sm)", color:"var(--text-muted)", marginBottom: 20 }}>
              <i data-lucide="arrow-left" style={{width:16,height:16}}></i> 回首頁
            </a>
            <span className="ds-eyebrow">PORTFOLIO · 2026 雪季</span>
            <h1 style={{ fontSize: "clamp(30px, 5vw, var(--text-4xl))", margin: "10px 0 6px" }}>影像作品集</h1>
            <p style={{ color: "var(--text-muted)", fontSize: "var(--text-lg)", maxWidth: 520 }}>挑戰的汗水，與登頂的笑容。逐格收藏的雪地故事。</p>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginTop: 28, flexWrap:"wrap", gap:16 }}>
              <Tabs value={cat} onChange={setCat} tabs={[
                { value:"all", label:"全部", count: all.length },
                { value:"powder", label:"粉雪 Powder" },
                { value:"aerial", label:"空拍 Aerial" },
                { value:"portrait", label:"人像 Portrait" },
              ]} />
              <MetaRow items={[{ value: shown.length, unit: "件作品" }]} />
            </div>
          </header>
          <GalleryGrid items={shown} onOpen={setOpen} />
          <Lightbox item={open} onClose={()=>setOpen(null)} onPrev={()=>step(-1)} onNext={()=>step(1)} />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
