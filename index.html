<style>
  html, body { margin: 0; background: var(--surface-page); }
  /* 保險：舊版手機預覽按鈕若被舊 bundle 注入，一律隱藏（前台不顯示） */
  #mp-fab, #mp-overlay, #mp-close, #mp-label { display: none !important; }
  /* 開頁骨架：在 React/字型完全載入前先顯示，避免手機連線較慢時出現長時間空白畫面 */
  .henry-boot { min-height: 100svh; display: flex; align-items: center; justify-content: center; background: var(--surface-page, #fbfbfa); }
  .henry-boot__mark { width: 44px; height: 44px; border-radius: 50%; border: 3px solid rgba(83,135,153,0.16); border-top-color: #538799; animation: henry-boot-spin 0.85s linear infinite; }
  @keyframes henry-boot-spin { to { transform: rotate(360deg); } }

  /* ===== Tweaks 表現控制 ===== */
  /* 品牌主色 */
  :root[data-accent="moss"] {
    --brand: var(--moss-500); --brand-hover: var(--moss-600); --brand-active: var(--moss-700);
    --brand-soft: var(--moss-100, #e9efe3); --brand-soft-text: var(--moss-700);
    --accent: var(--moss-500); --accent-hover: var(--moss-600);
    --accent-soft: var(--moss-100, #e9efe3); --accent-soft-text: var(--moss-700);
    --surface-brand: var(--moss-500); --text-link: var(--moss-600);
  }
  :root[data-accent="deep"] {
    --brand: var(--ice-700); --brand-hover: var(--ice-800); --brand-active: var(--ice-800);
    --brand-soft: var(--ice-100); --brand-soft-text: var(--ice-800);
    --accent: var(--ice-700); --accent-hover: var(--ice-800);
    --accent-soft: var(--ice-100); --accent-soft-text: var(--ice-800);
    --surface-brand: var(--ice-700); --text-link: var(--ice-700);
  }
  /* 影像色調：套用於全站照片 */
  :root[data-tone="cool"] .ei-wrap img { filter: saturate(0.86) contrast(1.07) hue-rotate(-6deg); }
  :root[data-tone="mono"] .ei-wrap img { filter: grayscale(1) contrast(1.1); }
  .ei-wrap img { transition: filter 320ms ease; }
  /* Hero 滿版沉浸 */
  :root[data-hero="full"] { --hero-h: 100svh; }
  /* Cover 標題字型：明朝／宋體類選項 */
  :root[data-herofont="song"] .hero-mag__title { font-family: "Noto Serif TC", "Songti TC", "Shippori Mincho", serif; font-weight: 600; letter-spacing: 0.01em; }
  :root[data-herofont="songlight"] .hero-mag__title { font-family: "Noto Serif TC", "Songti TC", "Shippori Mincho", serif; font-weight: 300; letter-spacing: 0.02em; }
  :root[data-herofont="mincho"] .hero-mag__title { font-family: "Shippori Mincho", "Noto Serif TC", "Songti TC", serif; font-weight: 600; letter-spacing: 0.01em; }
</style>
<script>
  // 資源解析器：透過頁尾隱藏的 <img data-slot> 静態參照取得實際網址。
  // 打包成單一檔時，那些 img 的 src 會被改寫成內嵌資源，這裡就會回傳內嵌網址。
  window.A = function (p, variant) {
    var m = /([^\/]+)\.(jpg|jpeg|png|webp|svg)$/i.exec(p || "");
    if (!m) return p;
    if (m[2].toLowerCase() === "svg") return "assets/" + m[1] + ".svg";
    var folder = variant === "thumb" ? "thumbnails" : variant === "hero" ? "hero" : "full";
    if (folder === "hero" && ["cover-hero","philosophy-band","booking-cover"].indexOf(m[1]) < 0) folder = "full";
    return "assets/images/" + folder + "/" + m[1] + ".webp";
  };
  // 站內連結（打包成單一檔時會被改寫成根目錄檔名）
  window.HENRY_LINKS = {
    home: "index.html",
    booking: "booking.html",
    gallery: "gallery.html",
  };
</script>
