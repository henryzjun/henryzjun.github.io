    #root .ei-wrap img { aspect-ratio: var(--ar-real, auto) !important; height: auto !important; object-fit: contain !important; }

    .gallery-masonry figure { margin-bottom: 10px !important; }
  }
</style>
<script>
  window.A = function (p, variant) {
    var m = /([^\/]+)\.(jpg|jpeg|png|webp|svg)$/i.exec(p || "");
    if (!m) return p;
    if (m[2].toLowerCase() === "svg") return "assets/" + m[1] + ".svg";
    var folder = variant === "thumb" ? "thumbnails" : variant === "hero" ? "hero" : "full";
    if (folder === "hero" && ["cover-hero","philosophy-band","booking-cover"].indexOf(m[1]) < 0) folder = "full";
    return "assets/images/" + folder + "/" + m[1] + ".webp";
  };
  window.HENRY_LINKS = {
    home: "index.html",
    booking: "booking.html",
    gallery: "gallery.html",
  };
</script>
